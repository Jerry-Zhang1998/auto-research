<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>paper-name — Training</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3148;
  --text:#e2e4f0;--muted:#8b8fa8;--accent:#7c6af5;--cyan:#4fc3f7;
  --green:#69f0ae;--amber:#ffb74d;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;--r:8px}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);
  font-size:15px;line-height:1.6;max-width:1100px;margin:0 auto;padding:32px 24px 80px}
h1{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:6px}
.meta{color:var(--muted);font-size:.875rem;margin-bottom:28px}
.meta span{margin-right:16px}
.section{margin-bottom:44px}
.section-title{font-size:1rem;font-weight:700;color:var(--cyan);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
canvas{display:block;width:100%;height:280px}
table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:8px}
th{background:var(--surface2);border:1px solid var(--border);padding:10px 14px;text-align:left;
  color:var(--muted);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em}
td{border:1px solid var(--border);padding:10px 14px}
tr:nth-child(even) td{background:var(--surface)}
footer{margin-top:60px;padding-top:16px;border-top:1px solid var(--border);
  color:var(--muted);font-size:.8rem;text-align:center}
</style></head><body>

<h1>paper-name — Training Curves</h1>
<div class="meta">
  <span>📁 Run: <strong>run_YYYYMMDD_HHMMSS</strong></span>
  <span>📊 N steps · M epochs</span>
  <span>⏱ YYYY-MM-DD HH:MM</span>
</div>

<div class="section">
  <div class="section-title">Loss</div>
  <div class="chart-wrap"><canvas id="loss_chart"></canvas></div>
</div>

<div class="section">
  <div class="section-title">Validation Metrics</div>
  <div class="chart-wrap"><canvas id="metric_chart"></canvas></div>
</div>

<div class="section">
  <div class="section-title">Learning Rate</div>
  <div class="chart-wrap"><canvas id="lr_chart"></canvas></div>
</div>

<div class="section">
  <div class="section-title">Final Summary</div>
  <div class="card">
    <table>
      <tr><th>Metric</th><th>Final Value</th></tr>
      <tr><td>val_loss</td><td><code>—</code></td></tr>
      <tr><td>val_auc</td><td><code>—</code></td></tr>
    </table>
  </div>
</div>

<footer>auto-research · Generated by scripts/generate_viz.py</footer>

<!-- This file is a template. The real version is generated by:
     python3 scripts/generate_viz.py
       --log-dir  logs/{paper}/{run_name}
       --output-dir outputs/{paper}
-->
<script>
// Sample data — replaced with real metrics.jsonl content by generate_viz.py
const DATA = {
  steps: [50,100,150,200,250,300,350,400,450,500],
  loss_series: [
    {label:"train_loss", y:[0.82,0.71,0.63,0.57,0.52,0.48,0.45,0.42,0.41,0.40]},
    {label:"val_loss",   y:[null,0.74,null,0.60,null,0.51,null,0.45,null,0.43]}
  ],
  metric_series: [
    {label:"val_auc",      y:[null,0.72,null,0.79,null,0.83,null,0.86,null,0.87]},
    {label:"val_f1",       y:[null,0.68,null,0.75,null,0.80,null,0.83,null,0.85]},
    {label:"val_accuracy", y:[null,0.70,null,0.77,null,0.82,null,0.84,null,0.86]}
  ],
  lr: [1e-3,9e-4,8e-4,7e-4,6e-4,5e-4,4e-4,3e-4,2e-4,1e-4]
};

const COLORS=['#7c6af5','#4fc3f7','#69f0ae','#ffb74d','#ef5350'];
function lineChart(id,{title,series,xLabel='Step',yLabel='',xTicks}){
  const el=document.getElementById(id);if(!el)return;
  const dpr=window.devicePixelRatio||1;
  const W=el.parentElement.clientWidth-32,H=280;
  el.style.width=W+'px';el.style.height=H+'px';
  el.width=W*dpr;el.height=H*dpr;
  const g=el.getContext('2d');g.scale(dpr,dpr);
  const p={t:36,r:20,b:52,l:70},pw=W-p.l-p.r,ph=H-p.t-p.b;
  g.fillStyle='#1a1d27';g.fillRect(0,0,W,H);
  const vals=series.flatMap(s=>s.y.filter(v=>v!=null&&isFinite(v)));
  if(!vals.length)return;
  let mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  mn-=rng*.05;mx+=rng*.05;rng=mx-mn;
  const N=Math.max(...series.map(s=>s.y.length));
  const tx=i=>p.l+(N>1?i/(N-1):0)*pw, ty=v=>p.t+ph*(1-(v-mn)/rng);
  for(let i=0;i<=5;i++){
    const v=mn+rng*i/5,y=ty(v);
    g.strokeStyle='#2e3148';g.lineWidth=1;
    g.beginPath();g.moveTo(p.l,y);g.lineTo(p.l+pw,y);g.stroke();
    g.fillStyle='#8b8fa8';g.font='11px monospace';g.textAlign='right';
    g.fillText(v<10?v.toFixed(4):v.toFixed(1),p.l-5,y+4);
  }
  const step=Math.max(1,Math.ceil(N/8));
  for(let i=0;i<N;i+=step){
    const x=tx(i);
    g.strokeStyle='#2e3148';g.lineWidth=1;
    g.beginPath();g.moveTo(x,p.t);g.lineTo(x,p.t+ph);g.stroke();
    g.fillStyle='#8b8fa8';g.font='11px monospace';g.textAlign='center';
    g.fillText(xTicks?xTicks[i]:i,x,p.t+ph+16);
  }
  g.fillStyle='#e2e4f0';g.font='bold 13px sans-serif';g.textAlign='center';
  g.fillText(title,W/2,20);
  g.fillStyle='#8b8fa8';g.font='11px sans-serif';g.fillText(xLabel,p.l+pw/2,H-6);
  series.forEach((s,si)=>{
    g.strokeStyle=COLORS[si%COLORS.length];g.lineWidth=2;g.lineJoin='round';
    g.beginPath();let first=true;
    s.y.forEach((v,i)=>{
      if(v==null||!isFinite(v)){first=true;return;}
      first?g.moveTo(tx(i),ty(v)):g.lineTo(tx(i),ty(v));first=false;
    });g.stroke();
  });
  g.strokeStyle='#2e3148';g.lineWidth=1;g.strokeRect(p.l,p.t,pw,ph);
  g.font='12px sans-serif';
  let lx=p.l;
  series.forEach((s,si)=>{
    g.fillStyle=COLORS[si%COLORS.length];g.fillRect(lx,p.t+ph+30,12,12);
    g.fillStyle='#e2e4f0';g.textAlign='left';g.fillText(s.label,lx+16,p.t+ph+41);
    lx+=g.measureText(s.label).width+32;
  });
}
window.addEventListener('load',()=>{
  lineChart('loss_chart',{title:'Training & Validation Loss',series:DATA.loss_series,xLabel:'Step',xTicks:DATA.steps});
  lineChart('metric_chart',{title:'Validation Metrics',series:DATA.metric_series,xLabel:'Step',xTicks:DATA.steps});
  lineChart('lr_chart',{title:'Learning Rate Schedule',series:[{label:'lr',y:DATA.lr}],xLabel:'Step',xTicks:DATA.steps});
});
</script></body></html>
